<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 600px;">
    <h2>Thông tin Học Phần</h2>
    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" class="border p-4 rounded shadow-sm">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label>Tên học phần:</label>
            <input type="text" th:field="*{name}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label>Link Ảnh:</label>
            <input type="text" th:field="*{image}" class="form-control" />
        </div>
        <div class="mb-3">
            <label>Tín chỉ:</label>
            <input type="number" th:field="*{credits}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label>Giảng viên:</label>
            <input type="text" th:field="*{lecturer}" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label>Danh mục:</label>
            <select th:field="*{category.id}" class="form-select">
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Lưu Học Phần</button>
        <a th:href="@{/admin/courses}" class="btn btn-secondary ms-2">Hủy</a>
    </form>
</div>
</body>
</html>
