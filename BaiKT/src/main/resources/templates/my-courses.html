<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">CourseApp</a>
        <a class="btn btn-primary btn-sm" th:href="@{/home}">🔙 Quay lại Trang Chủ</a>
    </div>
</nav>

<div class="container table-responsive">
    <h2 class="text-center mb-4 text-success">Các Học Phần Đã Đăng Ký</h2>
    <table class="table table-bordered table-striped shadow-sm bg-white">
        <thead class="table-success">
        <tr>
            <th>Mã Đăng Ký</th><th>Tên môn học</th><th>Tín chỉ</th><th>Giảng viên</th><th>Ngày đăng ký</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="enrollment : ${enrollments}">
            <td th:text="${enrollment.id}"></td>
            <td class="fw-bold" th:text="${enrollment.course.name}"></td>
            <td th:text="${enrollment.course.credits}"></td>
            <td th:text="${enrollment.course.lecturer}"></td>
            <td th:text="${enrollment.enroll_date}"></td>
        </tr>
        </tbody>
    </table>
    <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-warning text-center shadow-sm">
        Bạn chưa đăng ký môn học nào! Hãy ra trang chủ để Enroll nhé.
    </div>
</div>
</body>
</html>
