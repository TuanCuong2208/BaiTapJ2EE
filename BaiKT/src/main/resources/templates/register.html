<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Đăng ký Tài khoản</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
  <h2 class="text-center mb-4">Đăng Ký Tài Khoản</h2>
  <form th:action="@{/register}" th:object="${student}" method="post" class="bg-white p-4 rounded shadow-sm">

    <div class="mb-3">
      <label class="form-label">Tên đăng nhập (Username):</label>
      <input type="text" th:field="*{username}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Mật khẩu (Password):</label>
      <input type="password" th:field="*{password}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label class="form-label">Email:</label>
      <input type="email" th:field="*{email}" class="form-control" required/>
    </div>

    <button type="submit" class="btn btn-primary w-100">Hoàn tất Đăng Ký</button>
    <div class="text-center mt-3">
      <a th:href="@{/home}" class="text-decoration-none">Quay lại trang chủ</a>
    </div>
  </form>
</div>
</body>
</html>
