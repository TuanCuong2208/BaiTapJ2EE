<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trang Chủ - Đăng Ký Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">CourseApp</a>
        <div class="collapse navbar-collapse d-flex justify-content-between">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link text-warning fw-bold" th:href="@{/enroll/my-courses}">📚 My Courses</a></li>
            </ul>
            <form class="d-flex w-50" th:action="@{/home}" method="get">
                <input class="form-control me-2" type="search" name="keyword" th:value="${keyword}" placeholder="Nhập tên môn học cần tìm..." required>
                <button class="btn btn-outline-light" type="submit">Tìm</button>
            </form>
            <a class="btn btn-danger btn-sm ms-3" th:href="@{/logout}">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container table-responsive">
    <h2 class="text-center mb-4 text-primary">Danh Sách Học Phần</h2>
    <table class="table table-bordered table-hover shadow-sm bg-white">
        <thead class="table-primary">
        <tr>
            <th>Hình ảnh</th><th>Tên học phần</th><th>Tín chỉ</th><th>Giảng viên</th><th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="course : ${courses}">
            <td><img th:src="${course.image}" alt="Ảnh" width="50" height="50" class="rounded"></td>
            <td class="fw-bold" th:text="${course.name}"></td>
            <td th:text="${course.credits}"></td>
            <td th:text="${course.lecturer}"></td>
            <td>
                <a th:href="@{'/enroll/course/' + ${course.id}}" class="btn btn-success btn-sm w-100">✔ Enroll</a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i ? 'active' : ''}">
                <a class="page-link" th:href="@{'/home?page=' + ${i}}" th:text="${i}"></a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
