<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center mb-4">Đăng Nhập Hệ Thống</h2>

    <div th:if="${param.error}" class="alert alert-danger text-center">Sai tài khoản hoặc mật khẩu!</div>

    <form th:action="@{/login}" method="post" class="bg-white p-4 rounded shadow-sm">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập:</label>
            <input type="text" name="username" class="form-control" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Mật khẩu:</label>
            <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
        <div class="text-center mt-3">
            <a th:href="@{/register}" class="text-decoration-none">Chưa có tài khoản? Đăng ký ngay</a>
        </div>
    </form>
</div>
</body>
</html>
