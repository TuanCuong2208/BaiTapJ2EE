<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Giỏ hàng của bạn</h2>
<table class="table table-bordered mt-3">
    <thead>
    <tr>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Thành tiền</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${cart}">
        <td th:text="${item.name}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.price * item.quantity}"></td>
    </tr>
    </tbody>
</table>
<h4 class="text-end text-danger">Tổng tiền: <span th:text="${total}"></span></h4>
<div class="text-end mt-3">
    <a th:href="@{/products}" class="btn btn-secondary">Tiếp tục mua hàng</a>
    <form th:action="@{/cart/checkout}" method="post" class="d-inline">
        <button type="submit" class="btn btn-success">Đặt hàng (Checkout)</button>
    </form>
</div>
</body>
</html>
