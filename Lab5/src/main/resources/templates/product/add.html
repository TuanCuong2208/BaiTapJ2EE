<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px">
        <div>
            <a class="navbar-brand" th:href="@{/products}">Home</a>
            <a class="navbar-brand" th:href="@{/products/add}">Products</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Add Product</h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" class="border p-4 rounded shadow-sm">
        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Image URL:</label>
            <input type="text" class="form-control" th:field="*{image}">
        </div>

        <div class="mb-3">
            <label class="form-label">Price:</label>
            <input type="number" class="form-control" th:field="*{price}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category:</label>
            <select class="form-select" th:field="*{category.id}">
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Add Product</button>
        <a href="/products" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
</body>
</html>
