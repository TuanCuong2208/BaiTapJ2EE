<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid" style="padding-left: 40px">
        <div>
            <a class="navbar-brand" th:href="@{/products}">Home</a>
            <a class="navbar-brand" th:href="@{/products/add}">Products</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <a th:href="@{/products/add}" class="btn btn-primary mb-3">Create New Product</a>

    <form th:action="@{/products}" method="get" class="d-flex align-items-center gap-2">

        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Nhập tên sản phẩm..." style="width: 250px;">

        <select name="categoryId" class="form-select" style="width: 200px;">
            <option value="">Tất cả danh mục</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == categoryId}"></option>
        </select>

        <select name="sort" class="form-select" style="width: 180px;">
            <option value="asc" th:selected="${sort == 'asc'}">Giá tăng dần</option>
            <option value="desc" th:selected="${sort == 'desc'}">Giá giảm dần</option>
        </select>

        <button type="submit" class="btn btn-primary">Lọc & Tìm</button>
        <a th:href="@{/products}" class="btn btn-secondary">Khôi phục</a>

    </form>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Image</th>
            <th scope="col">Price</th>
            <th scope="col">Category Name</th>
            <th scope="col">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td>
                <a th:href="@{/cart/add/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Thêm vào giỏ</a>
            </td>
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td>
                <img th:src="${product.image}" alt="Ảnh sản phẩm" style="max-width: 100px; height: auto; border-radius: 5px;">
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Previous</a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Next</a>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
